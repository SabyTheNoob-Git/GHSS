function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const state = {
  screen: "welcome", // welcome | quiz | result | review
  emis: "", name: "", classSection: "", formError: "",
  shuffled: [], currentIndex: 0, answers: {},
  scoreInfo: null, saving: false, saveError: "",
  openVideos: {},
};

function setState(patch) { Object.assign(state, patch); render(); }

function handleStart() {
  const emis = document.getElementById("f-emis").value.trim();
  const name = document.getElementById("f-name").value.trim();
  const cls = document.getElementById("f-class").value.trim();
  if (!emis || !name || !cls) {
    setState({ formError: "தயவுசெய்து அனைத்து விவரங்களையும் நிரப்பவும்." });
    return;
  }
  const shuffled = shuffleArray(QUESTIONS).map(q => ({ ...q, options: shuffleArray(q.options) }));
  setState({ emis, name, classSection: cls, formError: "", shuffled, currentIndex: 0, answers: {}, screen: "quiz" });
}

function selectOption(optIndex) {
  const q = state.shuffled[state.currentIndex];
  const opt = q.options[optIndex];
  state.answers[q.id] = opt;
  render();
}

function goPrev() {
  if (state.currentIndex > 0) setState({ currentIndex: state.currentIndex - 1 });
}

function goNext() {
  if (state.currentIndex < state.shuffled.length - 1) {
    setState({ currentIndex: state.currentIndex + 1 });
  } else {
    handleSubmit();
  }
}

function handleSubmit() {
  let score = 0;
  const chapterScores = {};
  CHAPTER_ORDER.forEach(c => chapterScores[c] = { correct: 0, total: 0 });
  state.shuffled.forEach(q => {
    chapterScores[q.chapter].total += 1;
    if (state.answers[q.id] === q.correct) {
      score += 1;
      chapterScores[q.chapter].correct += 1;
    }
  });
  const total = state.shuffled.length;
  const percentage = Math.round((score / total) * 1000) / 10;
  state.scoreInfo = { score, total, chapterScores };
  state.saving = true;
  state.saveError = "";
  state.screen = "result";
  render();

  const record = {
    emis: state.emis, name: state.name, classSection: state.classSection,
    score, total, percentage, timestamp: new Date().toISOString(),
  };

  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === 0) {
    state.saving = false;
    state.saveError = "⚠️ Apps Script URL அமைக்கப்படவில்லை — பதில் சேமிக்கப்படவில்லை.";
    render();
    return;
  }

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(record),
  }).then(() => {
    state.saving = false;
    render();
  }).catch(() => {
    state.saving = false;
    state.saveError = "முடிவுகளைச் சேமிக்க முடியவில்லை. இணைய இணைப்பைச் சரிபார்க்கவும்.";
    render();
  });
}

function resetForNewStudent() {
  setState({
    screen: "welcome", emis: "", name: "", classSection: "", formError: "",
    shuffled: [], currentIndex: 0, answers: {}, scoreInfo: null,
    saving: false, saveError: "", openVideos: {},
  });
}

function openVideo(qid) {
  state.openVideos[qid] = true;
  render();
}

function goReview() { setState({ screen: "review" }); }
function backToResult() { setState({ screen: "result" }); }

// ---------- RENDER ----------
function render() {
  document.body.className = "";
  const app = document.getElementById("app");
  if (state.screen === "welcome") app.innerHTML = renderWelcome();
  else if (state.screen === "quiz") app.innerHTML = renderQuiz();
  else if (state.screen === "result") app.innerHTML = renderResult();
  else if (state.screen === "review") app.innerHTML = renderReview();
}

function renderQuiz() {
  const q = state.shuffled[state.currentIndex];
  const pct = ((state.currentIndex + 1) / state.shuffled.length) * 100;
  const isLast = state.currentIndex === state.shuffled.length - 1;
  const selected = state.answers[q.id];
  const optsHtml = q.options.map((opt, idx) => {
    const isSel = selected === opt;
    return `<button class="opt ${isSel ? "selected" : ""}" onclick="selectOption(${idx})">
      <span class="opt-letter">${String.fromCharCode(65 + idx)}</span>${esc(opt)}
    </button>`;
  }).join("");

  return `
    <div class="card" style="padding:14px 16px;">
      <div class="qtop">
        <span class="chip">${esc(CHAPTER_TAMIL[q.chapter])}</span>
        <span class="qcount">${state.currentIndex + 1} / ${state.shuffled.length}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
        <div class="progress-dot" style="left:calc(${pct}% - 5px)"></div>
      </div>
    </div>
    <div class="card qcard">
      <p class="qtext">${esc(q.text)}</p>
      ${optsHtml}
    </div>
    <div class="navrow">
      <button class="btn btn-outline" ${state.currentIndex === 0 ? "disabled" : ""} onclick="goPrev()">← பின்</button>
      <button class="btn btn-dark" onclick="goNext()">${isLast ? "சமர்ப்பி · Submit" : "அடுத்து →"}</button>
    </div>
  `;
}

function renderResult() {
  const s = state.scoreInfo;
  const chBars = CHAPTER_ORDER.map(c => {
    const cs = s.chapterScores[c];
    const pct = cs.total ? (cs.correct / cs.total) * 100 : 0;
    return `<div class="chbar-row">
      <div class="chbar-label"><span>${esc(CHAPTER_TAMIL[c])}</span><span class="ui-font" style="font-weight:600">${cs.correct}/${cs.total}</span></div>
      <div class="chbar-track"><div class="chbar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join("");

  let statusHtml;
  if (state.saving) statusHtml = `<p class="toast" style="color:#94a3b8;">முடிவு சேமிக்கப்படுகிறது...</p>`;
  else if (state.saveError) statusHtml = `<p class="toast" style="color:#e11d48;">${esc(state.saveError)}</p>`;
  else statusHtml = `<p class="toast" style="color:#0d9488;">✓ முடிவு பதிவு செய்யப்பட்டது</p>`;

  return `
    <div class="hero" style="padding:32px 24px 40px;">
      <p class="eyebrow">முடிவு · Result</p>
      <div class="score-big">${s.score}<span class="score-total">/${s.total}</span></div>
      <p style="color:#c7d2fe;margin-top:8px;">${Math.round((s.score / s.total) * 1000) / 10}%</p>
    </div>
    <div class="card panel" style="border-top:none; border-radius:0 0 16px 16px;">
      <p class="ui-font" style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em;margin:0 0 10px;">அலகு வாரியான முடிவு</p>
      ${chBars}
      ${statusHtml}
      <button class="btn btn-outline" style="margin-top:6px;" onclick="goReview()">விடைகளை மீள்பார்வை செய் · Review Answers</button>
      <button class="btn btn-dark" style="margin-top:10px;" onclick="resetForNewStudent()">அடுத்த மாணவர் · New Student</button>
    </div>
  `;
}

function renderReview() {
  const chapters = CHAPTER_ORDER.map(chapterName => {
    const qs = state.shuffled.filter(q => q.chapter === chapterName);
    if (qs.length === 0) return "";
    const video = CHAPTER_VIDEOS[chapterName];
    const qsHtml = qs.map(q => {
      const selected = state.answers[q.id];
      const isCorrect = selected === q.correct;
      const isUnanswered = !selected;
      let ansHtml;
      if (isUnanswered) ansHtml = `<p class="rev-ans rev-skip">பதிலளிக்கவில்லை</p>`;
      else if (isCorrect) ansHtml = `<p class="rev-ans rev-correct">✓ ${esc(selected)}</p>`;
      else ansHtml = `<p class="rev-ans rev-wrong">✗ உங்கள் விடை: ${esc(selected)}</p><p class="rev-ans rev-correct">✓ சரியான விடை: ${esc(q.correct)}</p>`;

      let videoHtml = "";
      if (video) {
        if (state.openVideos[q.id]) {
          videoHtml = `<div class="video-box"><iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1" title="${esc(video.title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
        } else {
          videoHtml = `<div class="video-box">
            <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg" alt="${esc(video.title)}">
            <button class="play-overlay" onclick="openVideo('${q.id}')">
              <span class="play-btn"></span>
              <span class="video-title">${esc(video.title)}</span>
            </button>
          </div>`;
        }
      }
      return `<div class="rev-q"><p class="rev-qtext">${esc(q.text)}</p>${ansHtml}${videoHtml}</div>`;
    }).join("");

    return `<div class="card rev-chapter">
      <div class="rev-chapter-head">${esc(CHAPTER_TAMIL[chapterName])}</div>
      ${qsHtml}
    </div>`;
  }).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 class="ui-font" style="font-size:18px;font-weight:700;color:#1e1b4b;margin:0;">விடைகள் மீள்பார்வை · Review</h2>
      <button class="link-btn" style="width:auto;margin:0;" onclick="backToResult()">← Back</button>
    </div>
    ${chapters}
    <button class="btn btn-dark" onclick="resetForNewStudent()">அடுத்த மாணவர் · New Student</button>
  `;
}

render();
</script>
</body>
</html>
